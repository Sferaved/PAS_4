name: Android CI/CD to Google Play

permissions:
  contents: write
  pull-requests: read

on:
  push:
    tags:
      - '*'

jobs:
  build_and_publish:
    name: Build and Publish to Google Play
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          clean: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Prepare and build
        run: |
          chmod +x gradlew
          
          # Проверка файлов
          for file in app/google-services.json keystore/keystore.jks keystore/service-account.json; do
            if [ ! -f "$file" ]; then echo "❌ $file not found"; exit 1; fi
          done
          echo "✅ All required files present"
          
          # Получение версии из тега
          TAG_NAME=${GITHUB_REF_NAME}
          CLEAN_VERSION=$(echo "$TAG_NAME" | sed 's/^v//')
          SUFFIX=$(echo "$CLEAN_VERSION" | grep -oE '[0-9]+$' || echo "1000")
          VERSION_CODE="4${SUFFIX}"
          
          echo "version_name=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "📌 Version: $CLEAN_VERSION → versionCode: $VERSION_CODE"
          
          # Сборка
          ./gradlew bundleRelease \
            -Pandroid.injected.version.code="$VERSION_CODE" \
            -Pandroid.injected.version.name="$CLEAN_VERSION" \
            --stacktrace
          
          # Проверка AAB
          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          if [ -f "$AAB_PATH" ]; then
            echo "✅ Build successful!"
            ls -la $(dirname "$AAB_PATH")
            echo "AAB_PATH=$AAB_PATH" >> $GITHUB_ENV
          else
            echo "❌ Build failed - AAB not found"
            exit 1
          fi
        id: build

      - name: Publish to Google Play
        run: |
          set -e
          PACKAGE_NAME="com.taxi_pas_4"
          AAB_PATH="${{ env.AAB_PATH }}"
          JSON_FILE="keystore/service-account.json"

          echo "🔑 Getting access token..."

          # Проверка существования файла
          if [ ! -f "$JSON_FILE" ]; then
            echo "❌ Service account file not found: $JSON_FILE"
            ls -la keystore/
            exit 1
          fi

          echo "✅ Service account file found"

          # Извлечение данных из JSON
          CLIENT_EMAIL=$(jq -r '.client_email' "$JSON_FILE")
          PRIVATE_KEY_RAW=$(jq -r '.private_key' "$JSON_FILE")

          echo "📧 Client email: $CLIENT_EMAIL"

          # ДИАГНОСТИКА: показываем первые и последние символы ключа
          echo "🔍 Raw private key preview (first 100 chars):"
          echo "$PRIVATE_KEY_RAW" | head -c 100
          echo ""
          echo "🔍 Raw private key preview (last 100 chars):"
          echo "$PRIVATE_KEY_RAW" | tail -c 100
          echo ""

          # Правильное форматирование приватного ключа
          # 1. Сначала удаляем обрамляющие кавычки, если они есть
          # 2. Заменяем \n на реальные переносы строк
          # 3. Убеждаемся, что ключ имеет правильный формат PEM

          # Убираем кавычки в начале и конце, если они есть
          PRIVATE_KEY_CLEAN=$(echo "$PRIVATE_KEY_RAW" | sed 's/^"//; s/"$//')

          # Заменяем \n на реальные переносы строк
          PRIVATE_KEY=$(echo "$PRIVATE_KEY_CLEAN" | sed 's/\\n/\n/g')

          # ДИАГНОСТИКА: проверяем формат ключа
          echo "🔍 Private key first line after formatting:"
          echo "$PRIVATE_KEY" | head -n1
          echo "🔍 Private key last line after formatting:"
          echo "$PRIVATE_KEY" | tail -n1

          # Сохраняем ключ во временный файл
          echo "$PRIVATE_KEY" > /tmp/private-key.pem
          chmod 600 /tmp/private-key.pem

          # Проверяем, что ключ имеет правильный формат PEM
          if ! grep -q "BEGIN PRIVATE KEY" /tmp/private-key.pem; then
            echo "❌ Private key does not have BEGIN PRIVATE KEY marker"
            echo "Content of key file:"
            cat /tmp/private-key.pem
            exit 1
          fi

          echo "✅ Private key has correct PEM format"

          # Создание JWT
          NOW=$(date +%s)
          EXP=$(($NOW + 3600))

          JWT_HEADER='{"alg":"RS256","typ":"JWT"}'
          JWT_CLAIM="{\"iss\":\"$CLIENT_EMAIL\",\"scope\":\"https://www.googleapis.com/auth/androidpublisher\",\"aud\":\"https://oauth2.googleapis.com/token\",\"exp\":$EXP,\"iat\":$NOW}"

          echo "🔍 JWT Header: $JWT_HEADER"
          echo "🔍 JWT Claim: $JWT_CLAIM"

          # Base64URL кодирование (без padding)
          B64_HEADER=$(echo -n "$JWT_HEADER" | base64 -w 0 | tr '+/' '-_' | tr -d '=')
          B64_CLAIM=$(echo -n "$JWT_CLAIM" | base64 -w 0 | tr '+/' '-_' | tr -d '=')

          echo "🔍 B64 Header length: ${#B64_HEADER}"
          echo "🔍 B64 Claim length: ${#B64_CLAIM}"

          # Создание подписи с проверкой ошибок
          echo "📝 Creating signature..."
          if ! SIGNATURE=$(echo -n "$B64_HEADER.$B64_CLAIM" | openssl dgst -sha256 -sign /tmp/private-key.pem 2>/tmp/openssl_error.log | base64 -w 0 | tr '+/' '-_' | tr -d '='); then
            echo "❌ OpenSSL signing failed"
            cat /tmp/openssl_error.log
            exit 1
          fi

          echo "✅ Signature created, length: ${#SIGNATURE}"

          # Формирование assertion
          ASSERTION="$B64_HEADER.$B64_CLAIM.$SIGNATURE"
          echo "🔍 Assertion length: ${#ASSERTION}"

          # Получение токена с подробным выводом
          echo "📡 Requesting token from Google..."

          # Используем отдельные параметры -d для избежания проблем с квотированием
          RESPONSE=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer" \
            --data-urlencode "assertion=$ASSERTION")

          # Проверка ответа
          echo "🔍 Response: $RESPONSE"

          # Извлекаем токен или ошибку
          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            ERROR=$(echo "$RESPONSE" | jq -r '.error')
            ERROR_DESC=$(echo "$RESPONSE" | jq -r '.error_description')
            echo "❌ Google API error: $ERROR - $ERROR_DESC"

            # Если ошибка подписи, попробуем альтернативный метод форматирования ключа
            echo "🔄 Trying alternative key formatting..."

            # Альтернативный метод: сохраняем ключ как есть, без обработки
            echo "$PRIVATE_KEY_RAW" > /tmp/private-key-alt.pem

            # Пробуем снова с альтернативным ключом
            SIGNATURE_ALT=$(echo -n "$B64_HEADER.$B64_CLAIM" | openssl dgst -sha256 -sign /tmp/private-key-alt.pem 2>/dev/null | base64 -w 0 | tr '+/' '-_' | tr -d '=')

            ASSERTION_ALT="$B64_HEADER.$B64_CLAIM.$SIGNATURE_ALT"

            RESPONSE_ALT=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer" \
              --data-urlencode "assertion=$ASSERTION_ALT")

            ACCESS_TOKEN=$(echo "$RESPONSE_ALT" | jq -r '.access_token // empty')

            if [ -n "$ACCESS_TOKEN" ]; then
              echo "✅ Alternative method succeeded!"
            else
              echo "❌ Alternative method also failed"
              echo "Response: $RESPONSE_ALT"
              exit 1
            fi
          else
            ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
          fi

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ Failed to get access token"
            exit 1
          fi

          echo "✅ Access token obtained"

          # Далее ваш код публикации...
          # (остальной код без изменений)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.AAB_PATH }}
          name: Release ${{ steps.build.outputs.version_name }}
          body_path: app/src/main/play/en-US/whatsnew.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
