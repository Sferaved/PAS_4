name: Android CI/CD to Google Play

permissions:
  contents: write
  pull-requests: read

on:
  push:
    tags:
      - '*'

jobs:
  publish_to_google_play:
    name: Publish to Google Play
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          clean: true

      - name: Check if AAB exists
        run: |
          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          if [ -f "$AAB_PATH" ]; then
            echo "✅ AAB found at $AAB_PATH"
            ls -la $(dirname "$AAB_PATH")
            echo "AAB_PATH=$AAB_PATH" >> $GITHUB_ENV
          else
            echo "❌ AAB not found at $AAB_PATH"
            echo "Available files in app/build/outputs:"
            find app/build/outputs -type f -name "*.aab" 2>/dev/null || echo "No AAB files found"
            exit 1
          fi

      - name: Get version from AAB
        run: |
          # Пытаемся получить версию из тега или из имени файла
          TAG_NAME=${GITHUB_REF_NAME}
          CLEAN_VERSION=$(echo "$TAG_NAME" | sed 's/^v//')
          echo "version_name=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          echo "📌 Version from tag: $CLEAN_VERSION"
        id: version

      - name: Publish to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.taxi_pas_4
          releaseFiles: ${{ env.AAB_PATH }}
          track: internal
          whatsNewDirectory: app/src/main/play

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.AAB_PATH }}
          name: Release ${{ steps.version.outputs.version_name }}
          body_path: app/src/main/play/en-US/whatsnew.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}