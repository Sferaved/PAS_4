name: Android CI/CD to Google Play

permissions:
  contents: write
  pull-requests: read

on:
  push:
    tags:
      - '*'

jobs:
  build_and_publish:
    name: Build and Publish to Google Play
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: master
          clean: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Prepare and build
        run: |
          chmod +x gradlew
          
          # Проверка файлов
          for file in app/google-services.json keystore/keystore.jks keystore/service-account.json; do
            if [ ! -f "$file" ]; then echo "❌ $file not found"; exit 1; fi
          done
          echo "✅ All required files present"
          
          # Получение версии из тега
          TAG_NAME=${GITHUB_REF_NAME}
          CLEAN_VERSION=$(echo "$TAG_NAME" | sed 's/^v//')
          SUFFIX=$(echo "$CLEAN_VERSION" | grep -oE '[0-9]+$' || echo "1000")
          VERSION_CODE="4${SUFFIX}"
          
          echo "version_name=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "📌 Version: $CLEAN_VERSION → versionCode: $VERSION_CODE"
          
          # Сборка
          ./gradlew bundleRelease \
            -Pandroid.injected.version.code="$VERSION_CODE" \
            -Pandroid.injected.version.name="$CLEAN_VERSION" \
            --stacktrace
          
          # Проверка AAB
          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          if [ -f "$AAB_PATH" ]; then
            echo "✅ Build successful!"
            ls -la $(dirname "$AAB_PATH")
            echo "AAB_PATH=$AAB_PATH" >> $GITHUB_ENV
          else
            echo "❌ Build failed - AAB not found"
            exit 1
          fi
        id: build

      - name: Publish to Google Play
        run: |
          set -e
          PACKAGE_NAME="com.taxi_pas_4"
          AAB_PATH="${{ env.AAB_PATH }}"
          JSON_FILE="keystore/service-account.json"

          echo "🔑 Getting access token..."

          # Проверка существования файла
          if [ ! -f "$JSON_FILE" ]; then
            echo "❌ Service account file not found: $JSON_FILE"
            ls -la keystore/
            exit 1
          fi

          echo "✅ Service account file found"

          # Извлечение данных из JSON - БЕЗ ИЗМЕНЕНИЙ!
          CLIENT_EMAIL=$(jq -r '.client_email' "$JSON_FILE")

          # ИЗМЕНЕНИЕ: Используем ключ как есть, без обработки
          # Просто извлекаем и сохраняем
          PRIVATE_KEY=$(jq -r '.private_key' "$JSON_FILE")

          echo "📧 Client email: $CLIENT_EMAIL"
          echo "🔍 Private key length: ${#PRIVATE_KEY}"

          # Сохраняем ключ во временный файл КАК ЕСТЬ
          echo "$PRIVATE_KEY" > /tmp/private-key.pem
          chmod 600 /tmp/private-key.pem

          # Проверяем первые несколько строк для диагностики
          echo "🔍 Private key first line:"
          head -n1 /tmp/private-key.pem
          echo "🔍 Private key last line:"
          tail -n1 /tmp/private-key.pem

          # Создание JWT
          NOW=$(date +%s)
          EXP=$(($NOW + 3600))

          JWT_HEADER='{"alg":"RS256","typ":"JWT"}'
          JWT_CLAIM="{\"iss\":\"$CLIENT_EMAIL\",\"scope\":\"https://www.googleapis.com/auth/androidpublisher\",\"aud\":\"https://oauth2.googleapis.com/token\",\"exp\":$EXP,\"iat\":$NOW}"

          # Base64URL кодирование
          B64_HEADER=$(echo -n "$JWT_HEADER" | base64 -w 0 | tr '+/' '-_' | tr -d '=')
          B64_CLAIM=$(echo -n "$JWT_CLAIM" | base64 -w 0 | tr '+/' '-_' | tr -d '=')

          echo "📝 Creating signature..."

          # Создание подписи - используем ключ как есть
          SIGNATURE=$(echo -n "$B64_HEADER.$B64_CLAIM" | openssl dgst -sha256 -sign /tmp/private-key.pem | base64 -w 0 | tr '+/' '-_' | tr -d '=')

          # Формирование assertion
          ASSERTION="$B64_HEADER.$B64_CLAIM.$SIGNATURE"

          # Получение токена
          echo "📡 Requesting token from Google..."

          # Пробуем оба варианта отправки
          RESPONSE=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$ASSERTION")

          # Проверка ответа
          ACCESS_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ Failed with first method, trying second..."

            # Второй вариант с раздельными параметрами
            RESPONSE2=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer" \
              -d "assertion=$ASSERTION")

            ACCESS_TOKEN=$(echo "$RESPONSE2" | jq -r '.access_token // empty')

            if [ -z "$ACCESS_TOKEN" ]; then
              echo "❌ Failed to get access token"
              echo "Response: $RESPONSE2"
              exit 1
            fi
          fi

          echo "✅ Access token obtained"

          # Создание edit
          echo "📝 Creating edit..."
          EDIT_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE_NAME/edits")

          EDIT_ID=$(echo "$EDIT_RESPONSE" | jq -r '.id // empty')

          if [ -z "$EDIT_ID" ]; then
            echo "❌ Failed to create edit"
            echo "Response: $EDIT_RESPONSE"
            exit 1
          fi

          echo "✅ Edit created: $EDIT_ID"

          # Загрузка AAB
          echo "📦 Uploading AAB..."
          UPLOAD_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$AAB_PATH" \
            "https://androidpublisher.googleapis.com/upload/androidpublisher/v3/applications/$PACKAGE_NAME/edits/$EDIT_ID/bundles?uploadType=media")

          VERSION_CODE=$(echo "$UPLOAD_RESPONSE" | jq -r '.versionCode // empty')

          if [ -z "$VERSION_CODE" ]; then
            echo "❌ Upload failed"
            echo "Response: $UPLOAD_RESPONSE"
            exit 1
          fi

          echo "✅ Uploaded, version code: $VERSION_CODE"

          # Release notes
          EN_NOTES=$(jq -Rs . < "app/src/main/play/en-US/whatsnew.txt" 2>/dev/null || echo "\"Release ${{ steps.build.outputs.version_name }}\"")
          RU_NOTES=$(jq -Rs . < "app/src/main/play/ru-RU/whatsnew.txt" 2>/dev/null || echo "\"Релиз ${{ steps.build.outputs.version_name }}\"")
          UK_NOTES=$(jq -Rs . < "app/src/main/play/uk/whatsnew.txt" 2>/dev/null || echo "\"Реліз ${{ steps.build.outputs.version_name }}\"")

          # Обновление треков
          for TRACK in internal alpha beta; do
            echo "Updating track: $TRACK"

            curl -s -X PUT \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"releases\": [{
                  \"versionCodes\": [$VERSION_CODE],
                  \"status\": \"completed\",
                  \"releaseNotes\": [
                    {\"language\": \"en-US\", \"text\": $EN_NOTES},
                    {\"language\": \"ru-RU\", \"text\": $RU_NOTES},
                    {\"language\": \"uk\", \"text\": $UK_NOTES}
                  ]
                }]
              }" \
              "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE_NAME/edits/$EDIT_ID/tracks/$TRACK" > /dev/null

            echo "  ✅ Track $TRACK updated"
          done

          # Commit
          echo "💾 Committing changes..."
          COMMIT_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE_NAME/edits/$EDIT_ID:commit")

          echo "$COMMIT_RESPONSE" | jq .
          echo "✅ Published to internal, alpha, beta!"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.AAB_PATH }}
          name: Release ${{ steps.build.outputs.version_name }}
          body_path: app/src/main/play/en-US/whatsnew.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
