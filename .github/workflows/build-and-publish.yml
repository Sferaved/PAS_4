name: Android CI/CD to Google Play

permissions:
  contents: write
  pull-requests: read

on:
  workflow_run:
    workflows: ["Unit tests"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag for manual republish (e.g. v4.1083)'
        required: true
        type: string

jobs:
  resolve_release:
    name: Resolve release tag
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version_name: ${{ steps.release.outputs.version_name }}
      version_code: ${{ steps.release.outputs.version_code }}
    steps:
      - name: Checkout commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Find version tag
        id: release
        env:
          DISPATCH_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || '' }}
        run: |
          if [ -n "$DISPATCH_TAG" ]; then
            TAG="$DISPATCH_TAG"
            echo "Manual republish tag: $TAG"
          else
            git fetch origin --tags --force
            TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]' | sort -V | tail -1)
          fi
          if [ -z "$TAG" ]; then
            echo "No release tag on this commit — skip Google Play build"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CLEAN_VERSION=$(echo "$TAG" | sed 's/^v//')
          SUFFIX=$(echo "$CLEAN_VERSION" | grep -oE '[0-9]+$' || echo "1000")
          VERSION_CODE="4${SUFFIX}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_name=$CLEAN_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Release: $TAG (versionCode=$VERSION_CODE)"

  build_and_publish:
    name: Build and Publish to Google Play
    needs: resolve_release
    if: ${{ needs.resolve_release.outputs.tag != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve_release.outputs.tag }}
          clean: true

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        run: |
          set -e
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=$SDK_ROOT" >> "$GITHUB_ENV"
          if [ -x "$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER="$SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          else
            echo "sdkmanager not found under $SDK_ROOT"
            ls -la "$SDK_ROOT/cmdline-tools" 2>/dev/null || true
            exit 1
          fi
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" --install "platforms;android-36" "build-tools;36.0.0"

      - name: Create local.properties
        run: |
          SDK_DIR="${ANDROID_SDK_ROOT:-${ANDROID_HOME}}"
          if [ -z "$SDK_DIR" ]; then
            echo "ANDROID_SDK_ROOT / ANDROID_HOME not set"
            exit 1
          fi
          printf 'sdk.dir=%s\n' "$SDK_DIR" > local.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare and build
        run: |
          chmod +x gradlew
          
          # Проверка файлов
          for file in app/google-services.json app/keystore/keystore.jks; do
            if [ ! -f "$file" ]; then echo "❌ $file not found"; exit 1; fi
          done
          echo "✅ All required files present"
          
          CLEAN_VERSION="${{ needs.resolve_release.outputs.version_name }}"
          VERSION_CODE="${{ needs.resolve_release.outputs.version_code }}"
          
          echo "version_name=$CLEAN_VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "Version: $CLEAN_VERSION → versionCode: $VERSION_CODE"
          
          # Сборка (unit tests already passed in Unit tests workflow)
          ./gradlew bundleRelease \
            -Pandroid.injected.version.code="$VERSION_CODE" \
            -Pandroid.injected.version.name="$CLEAN_VERSION" \
            --stacktrace
          
          # Проверка AAB
          AAB_PATH="app/build/outputs/bundle/release/app-release.aab"
          if [ -f "$AAB_PATH" ]; then
            echo "✅ Build successful!"
            ls -la $(dirname "$AAB_PATH")
            echo "AAB_PATH=$AAB_PATH" >> $GITHUB_ENV
          else
            echo "❌ Build failed - AAB not found"
            exit 1
          fi
        id: build

#      # Упрощенная публикация через готовый action
#      - name: Publish to Google Play
#        uses: r0adkll/upload-google-play@v1
#        with:
#          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
#          packageName: com.taxi_pas_4
#          releaseFiles: app/build/outputs/bundle/release/app-release.aab
#          track: internal
#          whatsNewDirectory: app/play

      - name: Publish to Google Play
        run: |
          set -e
          PACKAGE_NAME="com.taxi_pas_4"
          AAB_PATH="${{ env.AAB_PATH }}"
          
          # Создаем JSON файл из секрета
          echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > /tmp/service-account.json
          JSON_FILE="/tmp/service-account.json"
          
          # Получение токена
          CLIENT_EMAIL=$(jq -r '.client_email' "$JSON_FILE")
          PRIVATE_KEY=$(jq -r '.private_key' "$JSON_FILE")
          
          NOW=$(date +%s)
          EXP=$(($NOW + 3600))
          
          JWT_HEADER='{"alg":"RS256","typ":"JWT"}'
          JWT_CLAIM="{\"iss\":\"$CLIENT_EMAIL\",\"scope\":\"https://www.googleapis.com/auth/androidpublisher\",\"aud\":\"https://oauth2.googleapis.com/token\",\"exp\":$EXP,\"iat\":$NOW}"
          
          B64_HEADER=$(echo -n "$JWT_HEADER" | base64 -w 0 | tr '/+' '_-' | tr -d '=')
          B64_CLAIM=$(echo -n "$JWT_CLAIM" | base64 -w 0 | tr '/+' '_-' | tr -d '=')
          
          echo "$PRIVATE_KEY" > /tmp/private-key.pem
          SIGNATURE=$(echo -n "$B64_HEADER.$B64_CLAIM" | openssl dgst -sha256 -sign /tmp/private-key.pem | base64 -w 0 | tr '/+' '_-' | tr -d '=')
          
          ACCESS_TOKEN=$(curl -s -X POST "https://oauth2.googleapis.com/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=$B64_HEADER.$B64_CLAIM.$SIGNATURE" \
            | jq -r '.access_token // empty')
          
          [ -z "$ACCESS_TOKEN" ] && { echo "❌ Failed to get access token"; exit 1; }
          
          # Создание edit и загрузка
          EDIT_ID=$(curl -s -X POST -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE_NAME/edits" \
            | jq -r '.id // empty')
          
          [ -z "$EDIT_ID" ] && { echo "❌ Failed to create edit"; exit 1; }
          
          VERSION_CODE=$(curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$AAB_PATH" \
            "https://androidpublisher.googleapis.com/upload/androidpublisher/v3/applications/$PACKAGE_NAME/edits/$EDIT_ID/bundles?uploadType=media" \
            | jq -r '.versionCode // empty')
          
          [ -z "$VERSION_CODE" ] && { echo "❌ Upload failed"; exit 1; }
          
          # Release notes (Google Play max 500 chars per language)
          for NOTES_FILE in app/play/en-US/whatsnew.txt app/play/ru-RU/whatsnew.txt app/play/uk/whatsnew.txt; do
            LEN=$(wc -m < "$NOTES_FILE" | tr -d ' ')
            if [ "$LEN" -gt 500 ]; then
              echo "❌ $NOTES_FILE is $LEN chars (max 500)"
              exit 1
            fi
          done
          EN_NOTES=$(jq -Rs . < "app/play/en-US/whatsnew.txt" 2>/dev/null || echo "\"Release ${{ steps.build.outputs.version_name }}\"")
          RU_NOTES=$(jq -Rs . < "app/play/ru-RU/whatsnew.txt" 2>/dev/null || echo "\"Релиз ${{ steps.build.outputs.version_name }}\"")
          UK_NOTES=$(jq -Rs . < "app/play/uk/whatsnew.txt" 2>/dev/null || echo "\"Реліз ${{ steps.build.outputs.version_name }}\"")
          
          # Обновление треков
          #   for TRACK in internal alpha beta production; do
          for TRACK in internal alpha beta production; do
            curl -s -X PUT \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"releases\": [{
                  \"versionCodes\": [$VERSION_CODE],
                  \"status\": \"completed\",
                  \"releaseNotes\": [
                    {\"language\": \"en-US\", \"text\": $EN_NOTES},
                    {\"language\": \"ru-RU\", \"text\": $RU_NOTES},
                    {\"language\": \"uk\", \"text\": $UK_NOTES}
                  ]
                }]
              }" \
              "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE_NAME/edits/$EDIT_ID/tracks/$TRACK" > /dev/null
          done
          
          # Commit
          curl -s -X POST \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE_NAME/edits/$EDIT_ID:commit" \
            | jq . && echo "✅ Published to internal, alpha, beta, production!"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve_release.outputs.tag }}
          files: ${{ env.AAB_PATH }}
          name: Release ${{ steps.build.outputs.version_name }}
          body_path: app/play/en-US/whatsnew.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}